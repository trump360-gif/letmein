name: Auto Posting Cron

on:
  schedule:
    # 매시간 정각 실행 (UTC 기준 → KST +9시간)
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  trigger-batch-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger batch generation
        run: |
          curl -X POST "${{ secrets.ADMIN_URL }}/api/v1/cron/auto-posting" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
