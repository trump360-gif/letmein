name: letmein_app
description: "성형 플랫폼 - 역경매 상담 요청 시스템"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^3.3.1

  # 네트워크
  dio: ^5.9.2

  # 라우팅
  go_router: ^17.1.0

  # 보안 저장소 (JWT 토큰)
  flutter_secure_storage: ^10.0.0

  # 이미지
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # 직렬화
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  centrifuge: ^0.18.0
  url_launcher: ^6.3.2
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.11.0
  freezed: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
